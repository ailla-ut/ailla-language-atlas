    <div id="storymap"></div>
    <script src="https://cdn.knightlab.com/libs/storymapjs/latest/js/storymap-min.js"></script>
    <script>
        var storymap_data = {"storymap": {"language": "pt", "map_type": "stamen:terrain", "slides": [{"type": "overview", "text": {"headline": "Línguas quéchuas no arquivo AILLA", "text": "<p>Uma jornada cronológica através da documentação das línguas quéchuas no Arquivo das Línguas Indígenas da América Latina (AILLA) da Universidade do Texas em Austin.</p><p> Este mapa apresenta <strong>9 idiomas</strong> com slides detalhados, cobrindo os Andes (Argentina, Bolívia, Colômbia, Equador, Peru). Além disso, 6 línguas são específicas no resumo final.</p><p> Os slides estão ordenados cronologicamente pelo início da documentação específica para cada idioma no acervo da AILLA.</p><p> <a href=\"https://ailla.utexas.org\" target=\"_blank\">Visitar o AILLA</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}, {"text": {"headline": "Quechua, South Bolivian", "text": "<p>O quíchua do sul da Bolívia é uma língua quíchua falada por aproximadamente 1.616.000 pessoas na Bolívia e na Argentina. A AILLA possui 302 itens relacionados ao quíchua do sul da Bolívia, dos quais apenas 140 são de acesso público, sendo a documentação mais antiga datada de 1969. O acervo inclui entrevistas, narrativas e materiais etnográficos, com contribuições da coleção de quíchua boliviano de Gladys Camacho Rios, da Coleção de Línguas Quíchua de Rosaleen Howard e de coleções que documentam a arte oral e a fala infantil em Chuquisaca.</p><p> <strong>Também conhecido como:</strong> Quechua Central Boliviano, Quechua Boliviano</p><p> <strong>Países:</strong> Argentina; Bolívia</p><p> <strong>Acervo do AILLA:</strong> 307 itens (145 de acesso público), 11 coleções</p><p> <strong>Datas de criação:</strong> 1959-2021</p><p> <strong>Datas de depósito:</strong> 2009-2022</p><p> <strong>ISO 639-3:</strong> quh</p><p> <a href=\"https://ailla.utexas.org/languages/213\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -17.3651, "lon": -66.1767, "line": true}}, {"text": {"headline": "Inga", "text": "<p>O inga é uma língua quéchua falada por aproximadamente 22.000 pessoas nos departamentos de Putumayo e Nariño, na Colômbia. A AILLA possui 58 itens relacionados ao inga, sendo a documentação mais antiga datada de 1975. O acervo provém da Coleção de Línguas Colombianas de John McDowell, que inclui canções, narrativas e conversas com transcrições e traduções para o inglês.</p><p> <strong>Países:</strong> Colômbia</p><p> <strong>Acervo do AILLA:</strong> 60 itens (59 de acesso público), 2 coleções</p><p> <strong>Datas de criação:</strong> 1975-2003</p><p> <strong>Datas de depósito:</strong> 2002-2021</p><p> <strong>ISO 639-3:</strong> inb</p><p> <a href=\"https://ailla.utexas.org/languages/27\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": 1.1989, "lon": -77.2483, "line": true}}, {"text": {"headline": "Kichwa, Cañar Highland", "text": "<p>O quíchua das terras altas de Cañar é uma língua quéchua falada por aproximadamente 170.000 pessoas nas províncias de Cañar, Azuay e Chimborazo, no Equador. O AILLA possui 85 itens relacionados ao quíchua das terras altas de Cañar, com a documentação mais antiga datando de 1976. O acervo inclui narrativas, música, fotografias e materiais etnográficos, com contribuições da Coleção de Música e Cultura Cañari de Allison Adrian, das gravações de narrativas orais de Rosaleen Howard, da fotografia documental de Judy Blankenship e do trabalho de campo antropológico de Niels Fock e Eva Krener em uma aldeia Cañari.</p><p> <strong>Nome indígena:</strong> Kichwa Shimi</p><p> <strong>Também conhecido como:</strong> Quichua da província de Cañar, Runa Shimi</p><p> <strong>Países:</strong> Equador</p><p> <strong>Acervo do AILLA:</strong> 155 itens (152 de acesso público), 6 coleções</p><p> <strong>Datas de criação:</strong> 1967-2021</p><p> <strong>Datas de depósito:</strong> 2019-2022</p><p> <strong>ISO 639-3:</strong> qxr</p><p> <a href=\"https://ailla.utexas.org/languages/232\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -2.5109, "lon": -78.9632, "line": true}}, {"text": {"headline": "Quechua, Huamalíes-Huánuco", "text": "<p>O quíchua huamalies-huanuco é uma língua quíchua falada por aproximadamente 44.900 pessoas na região de Huánuco, no Peru. A AILLA possui 71 itens relacionados ao quíchua huamalies-huanuco, com a documentação mais antiga datando de 1982. Toda a coleção provém da Coleção de Línguas Quíchua de Rosaleen Howard, que inclui narrativas orais, notas de campo, conversas e canções.</p><p> <strong>Países:</strong> Peru</p><p> <strong>Acervo do AILLA:</strong> 71 itens (66 de acesso público), 1 coleção</p><p> <strong>Data de criação:</strong> 1982-2011</p><p> <strong>ISO 639-3:</strong> qvh</p><p> <a href=\"https://ailla.utexas.org/languages/233\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -9.9734, "lon": -76.3149, "line": true}}, {"text": {"headline": "Quechua, Pastaza", "text": "<p>O quéchua de Pastaza é uma língua quéchua falada por aproximadamente 13.000 pessoas na província de Pastaza, no leste do Equador. A AILLA possui 233 itens relacionados ao quéchua de Pastaza, com a documentação mais antiga datando de 1988. O acervo é predominantemente composto por narrativas, provenientes em grande parte da coleção de Janis B. Nuckolls, que inclui pesquisas sobre ideofones. A coleção de Alexander Rice contribui com gravações de dialetos quéchua das terras baixas equatorianas.</p><p> <strong>Também conhecido como:</strong> Sarayucu Quichua, Alama, Bobonaza Quichua, Canelos Quichua, Pastaza Quichua</p><p> <strong>Países:</strong> Equador; Peru</p><p> <strong>Acervo do AILLA:</strong> 236 itens (217 de acesso público), 3 coleções</p><p> <strong>Datas de criação:</strong> 1980-2019</p><p> <strong>Datas de depósito:</strong> 2002-2019</p><p> <strong>ISO 639-3:</strong> qvz</p><p> <a href=\"https://ailla.utexas.org/languages/15\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -2.3295, "lon": -76.9872, "line": true}}, {"text": {"headline": "Quechua, Cuzco", "text": "<p>O quíchua de Cusco é uma língua quíchua falada por aproximadamente 668.000 pessoas em diversas regiões do sul do Peru. A AILLA possui 77 itens relacionados ao quíchua de Cusco, sendo a documentação mais antiga datada de 1997. O acervo inclui entrevistas e materiais de pesquisa extraídos da Coleção de Línguas Quíchua de Rosaleen Howard e da coleção &quot;A Fala das Crianças de Cusco e Chuquisaca&quot;.</p><p> <strong>Também conhecido como:</strong> Runasimi Qusqu Qullaw, Cuzco Quechua, Qheswa, Qheswasimi, Quechua de Cuzco-Collao, Quechua Qosqo-Qollaw, Runasimi</p><p> <strong>Países:</strong> Peru</p><p> <strong>Acervo do AILLA:</strong> 83 itens (81 de acesso público), 5 coleções</p><p> <strong>Data de criação:</strong> 1997-2013</p><p> <strong>Datas de depósito:</strong> 2005-2022</p><p> <strong>ISO 639-3:</strong> quiz</p><p> <a href=\"https://ailla.utexas.org/languages/89\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -13.5109, "lon": -71.9405, "line": true}}, {"text": {"headline": "Quechua, Yauyos", "text": "<p>O quíchua yauyos é um grupo linguístico do quíchua falado por aproximadamente 600 pessoas na província de Yauyos, departamento de Lima, Peru. A AILLA possui 222 itens relacionados ao quíchua yauyos, com a documentação mais antiga datando de 2010. Toda a coleção provém do trabalho de campo de Aviva Shimelman, que documenta diversas variedades dialetais em comunidades como Viñac, Hongos, Lincha, Liscay e Huangáscar. O acervo inclui narrativas, entrevistas, conversas e canções.</p><p> <strong>Países:</strong> Peru</p><p> <strong>Acervo do AILLA:</strong> 226 itens (220 de acesso público), 1 coleção</p><p> <strong>Data de criação:</strong> 2001-2014</p><p> <strong>Datas de depósito:</strong> 2010-2017</p><p> <strong>ISO 639-3:</strong> qux</p><p> <a href=\"https://ailla.utexas.org/languages/272\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -12.4237, "lon": -75.9166, "line": true}}, {"text": {"headline": "Quechua, Ancash Huayllas", "text": "<p>O quéchua huayllas de Ancash é uma língua quéchua central falada por aproximadamente 173.000 pessoas na região de Ancash, no Peru. A AILLA possui 33 itens relacionados ao quéchua huayllas de Ancash, sendo a documentação mais antiga datada de 2014. O acervo consiste em histórias orais ecológicas que documentam as mudanças climáticas e o recuo das geleiras na Cordilheira Branca, no Peru.</p><p> <strong>Nome indígena:</strong> Ancash Qichwachaw</p><p> <strong>Também conhecido como:</strong> Quechua, Huaraz, Quechua</p><p> <strong>Países:</strong> Peru</p><p> <strong>Acervo do AILLA:</strong> 33 itens, 2 coleções</p><p> <strong>Data de criação:</strong> 2014</p><p> <strong>Datas de depósito:</strong> 2007-2021</p><p> <strong>ISO 639-3:</strong> qwh</p><p> <a href=\"https://ailla.utexas.org/languages/133\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -9.5526, "lon": -77.4933, "line": true}}, {"text": {"headline": "Quechua, Chachapoyas", "text": "<p>O quéchua chachapoyas é uma língua quéchua falada por aproximadamente 840 pessoas na região amazônica do Peru. A AILLA possui 10 itens relacionados ao quéchua chachapoyas, com a documentação mais antiga datando de 2018. O acervo consiste na coleção de Flora e Fauna do Quéchua Chachapoyas, que documenta mais de 600 termos únicos coletados em 8 aldeias nas províncias de Chachapoyas e Luya.</p><p> <strong>Nome indígena:</strong> Llakwash</p><p> <strong>Também conhecido como:</strong> Amazonas</p><p> <strong>Países:</strong> Peru</p><p> <strong>Acervo do AILLA:</strong> 10 itens, 1 coleção</p><p> <strong>Data de criação:</strong> 2018</p><p> <strong>Data de depósito:</strong> 2019</p><p> <strong>ISO 639-3:</strong> quk</p><p> <a href=\"https://ailla.utexas.org/languages/539\" target=\"_blank\">Ver no AILLA</a></p>"}, "location": {"lat": -6.1517, "lon": -77.8476, "line": true}}, {"text": {"headline": "Línguas adicionais", "text": "<p>A linguagem a seguir possui acervos significativos na AILLA, mas os materiais públicos representam menos de 5 itens:</p><p> <a href=\"https://ailla.utexas.org/languages/231\" target=\"_blank\">Quichua, Tena Lowland</a> (80 itens, 3 públicos)</p><p> As seguintes 5 línguas da família quéchua têm menos de 5 itens no acervo atual do AILLA. À medida que as coleções do AILLA crescem, essas línguas poderão ser incluídas nas futuras atualizações deste mapa.</p><p> <a href=\"https://ailla.utexas.org/languages/37\" target=\"_blank\">Napo Quichua</a> (1 item)<br> <a href=\"https://ailla.utexas.org/languages/242\" target=\"_blank\">Quechua, Ayacucho</a> (2 itens, 1 público)<br> <a href=\"https://ailla.utexas.org/languages/587\" target=\"_blank\">Quechua, Huallaga</a> (1 item)<br> <a href=\"https://ailla.utexas.org/languages/547\" target=\"_blank\">Quechua, Puno</a> (2 itens)<br> <a href=\"https://ailla.utexas.org/languages/269\" target=\"_blank\">Quichua, Imbabura</a> (1 item)</p><p> <a href=\"https://ailla.utexas.org\" target=\"_blank\">Explore todas as coleções do AILLA</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}], "calculate_zoom": true}};
        var storymap = new KLStoryMap.StoryMap("storymap", storymap_data, {});
        window.addEventListener("resize", function() { storymap.updateDisplay(); });
