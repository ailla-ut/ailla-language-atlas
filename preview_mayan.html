<body>
    <div id="storymap"></div>
    <script src="https://cdn.knightlab.com/libs/storymapjs/latest/js/storymap-min.js"></script>
    <script>
        var storymap_data = {"storymap": {"language": "en", "map_type": "stamen:terrain", "slides": [{"type": "overview", "text": {"headline": "Mayan Languages in the AILLA Archive", "text": "<p>A chronological journey through the documentation of Mayan languages in the Archive of the Indigenous Languages of Latin America (AILLA) at the University of Texas at Austin.</p><p>This map features <strong>19 languages</strong> with detailed slides, covering Mesoamerica (Guatemala, Belize, Mexico). An additional 14 languages are listed in the closing summary.</p><p>Slides are ordered chronologically by the start of dedicated documentation for each language in AILLA's holdings.</p><p><a href=\"https://ailla.utexas.org\" target=\"_blank\">Visit AILLA</a></p>"}, "location": {"lat": 16.0, "lon": -90.5}}, {"text": {"headline": "Tzeltal", "text": "<p>Tzeltal is a Mayan language spoken by approximately 589,000 people in the highlands of Chiapas, Mexico, where it remains in vigorous use across generations. AILLA holds 343 items related to Tzeltal, with the earliest dedicated documentation from the 1960s, including narratives, conversations, ceremonies, and prayers. Key holdings include Gilles Polian's Tseltal Documentation Project, which captures diverse dialects and speech genres, and Brian Stross's field recordings from Chiapas.</p>\n<p><strong>Also known as:</strong> Bats'il k'op</p>\n<p><strong>Countries:</strong> Mexico</p>\n<p><strong>AILLA holdings:</strong> 360 items (354 publicly accessible), 13 collections</p>\n<p><strong>Dates created:</strong> 1959-2017</p>\n<p><strong>Dates deposited:</strong> 2006-2021</p>\n<p><strong>ISO 639-3:</strong> tzh</p>\n<p><a href=\"https://ailla.utexas.org/languages/175\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 16.7102, "lon": -92.1189, "line": true}}, {"text": {"headline": "Tzotzil", "text": "<p>Tzotzil is a Tzeltalan Mayan language spoken by approximately 550,000 people in central Chiapas, Mexico. AILLA holds 692 items related to Tzotzil with only 160 items being publicly accessible. The earliest dedicated documentation is from Victoria Bricker's and Terrence Kaufman's collections from the 1960s. The largest collection is John Haviland's extensive video and audio recordings from the 1970s to the present. The holdings are rich in narratives, conversations, and ethnographic materials.</p>\n<p><strong>Indigenous name:</strong> Bats'i k'op</p>\n<p><strong>Countries:</strong> Mexico</p>\n<p><strong>AILLA holdings:</strong> 714 items (180 publicly accessible), 12 collections</p>\n<p><strong>Dates created:</strong> 1959-2017</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> tzo</p>\n<p><a href=\"https://ailla.utexas.org/languages/174\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 16.8094, "lon": -92.6253, "line": true}}, {"text": {"headline": "Chorti", "text": "<p>Ch'orti' is an Eastern Cholan Mayan language spoken in eastern Guatemala and western Honduras, with approximately 16,700 speakers in Guatemala and no known L1 speakers remaining in Honduras. Considered a direct descendant of the Classic Maya language used in pre-Columbian inscriptions, AILLA's Ch'orti' holdings comprise 327 items, with the earliest dedicated documentation from 1964. The collection is anchored by John Fought's extensive fieldwork from 1964 to 1967, which contains several hundred recordings, field notes, and photographs. Kerry Michael Hull contributed a narrative recording with interlinearized text, translations, and an abbreviated dictionary.</p>\n<p><strong>Indigenous name:</strong> Ch'orti'</p>\n<p><strong>Also known as:</strong> Chorti’</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 340 items (338 publicly accessible), 9 collections</p>\n<p><strong>Dates created:</strong> 1959-2017</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> caa</p>\n<p><a href=\"https://ailla.utexas.org/languages/14\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 14.824, "lon": -89.0928, "line": true}}, {"text": {"headline": "Chuj", "text": "<p>Chuj is a Q'anjob'alan Mayan language spoken by approximately 58,600 people in the Huehuetenango department of Guatemala. AILLA holds 130 items related to Chuj, with the earliest dedicated documentation from 1964. Pedro Mateo Pedro and Jessica Coon's Chuj Oral Tradition Collection contributes narratives describing Mayan culture and history, many with annotated versions translated into Spanish or English or both. Nicholas Hopkins's collection contains extensive fieldwork recordings, field notes, and a dictionary from the 1960s.</p>\n<p><strong>Also known as:</strong> Chuh, Chuhe, Chuj de San Mateo Ixtatán, Chuje, Koti’</p>\n<p><strong>Countries:</strong> Mexico; Guatemala</p>\n<p><strong>AILLA holdings:</strong> 138 items (131 publicly accessible), 9 collections</p>\n<p><strong>Dates created:</strong> 1959-2017</p>\n<p><strong>Dates deposited:</strong> 2005-2021</p>\n<p><strong>ISO 639-3:</strong> cac</p>\n<p><a href=\"https://ailla.utexas.org/languages/157\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.8553, "lon": -91.5857, "line": true}}, {"text": {"headline": "Mocho", "text": "<p>Mocho is a Q'anjob'alan Mayan language spoken by approximately 130 people in Chiapas, Mexico. AILLA holds 237 items related to Mocho, with the earliest dedicated documentation from 1967. Laura Martin's collection is the largest, with recordings, transcriptions, and field notes from the 1970s onward. Lyle Campbell's and Terrence Kaufman's collections contribute extensive fieldwork from the late 1960s, including narratives, prayers, and elicitation materials.</p>\n<p><strong>Indigenous name:</strong> Qato'k</p>\n<p><strong>Also known as:</strong> Motozintleco, Motocintleco</p>\n<p><strong>Countries:</strong> Mexico</p>\n<p><strong>AILLA holdings:</strong> 285 items (284 publicly accessible), 5 collections</p>\n<p><strong>Dates created:</strong> 1966-2017</p>\n<p><strong>Dates deposited:</strong> 2003-2020</p>\n<p><strong>ISO 639-3:</strong> mhc</p>\n<p><a href=\"https://ailla.utexas.org/languages/39\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.4027, "lon": -92.3227, "line": true}}, {"text": {"headline": "Huasteco", "text": "<p>Huasteco is a Mayan language spoken by approximately 169,000 people in the Mexican states of San Luis Potosí and Veracruz. AILLA holds 290 items related to Huasteco, with the earliest dedicated documentation from 1969. The holdings are predominantly narratives and myths, drawn largely from Terrence Kaufman's Mayan Languages Collection, with additional contributions from Roberto Zavala Maldonado and Barbara Edmonson.</p>\n<p><strong>Indigenous name:</strong> Teenek</p>\n<p><strong>Also known as:</strong> Wasteko, Tenek, Tének</p>\n<p><strong>Countries:</strong> Mexico</p>\n<p><strong>AILLA holdings:</strong> 305 items (272 publicly accessible), 7 collections</p>\n<p><strong>Dates created:</strong> 1965-2017</p>\n<p><strong>Dates deposited:</strong> 2008-2022</p>\n<p><strong>ISO 639-3:</strong> hus</p>\n<p><a href=\"https://ailla.utexas.org/languages/156\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 21.3495, "lon": -98.879, "line": true}}, {"text": {"headline": "Ch'ol", "text": "<p>Ch'ol is a Western Cholan Mayan language spoken by approximately 255,000 people in Chiapas, Mexico. AILLA holds 321 items related to Ch'ol, with the earliest dedicated documentation from 1970 and 287 publicly accessible. The holdings are rich in narratives and oral histories, with dedicated collections from Juan Jesus Vazquez Alvarez and Jessica Coon and from Carol Rose Little featuring audio and video recordings with transcriptions and translations into Spanish.</p>\n<p><strong>Indigenous name:</strong> Lakty’añ</p>\n<p><strong>Also known as:</strong> Chol</p>\n<p><strong>Countries:</strong> Mexico</p>\n<p><strong>AILLA holdings:</strong> 340 items (306 publicly accessible), 15 collections</p>\n<p><strong>Dates created:</strong> 1959-2020</p>\n<p><strong>Dates deposited:</strong> 2007-2021</p>\n<p><strong>ISO 639-3:</strong> ctu</p>\n<p><a href=\"https://ailla.utexas.org/languages/145\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 17.3627, "lon": -92.4661, "line": true}}, {"text": {"headline": "Kaqchikel", "text": "<p>Kaqchikel is a K'ichean Mayan language spoken by approximately 411,000 people in the central highlands of Guatemala. AILLA holds 199 items related to Kaqchikel, with the earliest dedicated documentation from 1970. The holdings include narratives, wordlists, and lexical materials, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection and the Francisco Marroquin Linguistic Project (PLFM), which contributed an extensive dialect survey across more than 20 Kaqchikel-speaking communities.</p>\n<p><strong>Indigenous name:</strong> Kaqchikel</p>\n<p><strong>Also known as:</strong> Cakchiquel, Kaqchiquel</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 202 items (196 publicly accessible), 12 collections</p>\n<p><strong>Dates created:</strong> 1968-2020</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> cak</p>\n<p><a href=\"https://ailla.utexas.org/languages/30\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 14.7056, "lon": -90.8034, "line": true}}, {"text": {"headline": "K'ichee'", "text": "<p>K'ichee' is a Mayan language spoken by approximately 1,050,000 people in the central highlands of Guatemala. AILLA holds 343 items related to K'ichee', with the earliest dedicated documentation from 1971. The holdings include narratives, wordlists, and lexical materials, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection, the Mayan Cultural Patrimony Preservation Project, and the Francisco Marroquin Linguistic Project (PLFM), which contributed dialect surveys across approximately 20 K'ichee'-speaking communities.</p>\n<p><strong>Indigenous name:</strong> K'ichee'</p>\n<p><strong>Also known as:</strong> Quiché, Central K'iche', Central Quiché, Chiquel, Qach'ab'al, Qatzij</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 364 items (354 publicly accessible), 15 collections</p>\n<p><strong>Dates created:</strong> 1962-2019</p>\n<p><strong>Dates deposited:</strong> 2002-2023</p>\n<p><strong>ISO 639-3:</strong> quc</p>\n<p><a href=\"https://ailla.utexas.org/languages/131\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 14.7648, "lon": -91.5845, "line": true}}, {"text": {"headline": "Maya, Yucatec", "text": "<p>Yucatec Maya is spoken by approximately 801,000 people across Mexico's Yucatán Peninsula and northern Belize, making it the most widely spoken Mayan language outside of Guatemala. AILLA holds 126 items related to Yucatec Maya, with the earliest dedicated documentation from 1971. Victoria Bricker's collection contributes oral histories of the Caste War and carnival recordings, while Melissa Frazier's collection provides spoken language recordings and William Blunk-Fernández and Michael Carrasco contributed traditional narratives.</p>\n<p><strong>Indigenous name:</strong> Mayaa t'aan</p>\n<p><strong>Also known as:</strong> Maya</p>\n<p><strong>Countries:</strong> Mexico; Belize</p>\n<p><strong>AILLA holdings:</strong> 144 items (127 publicly accessible), 16 collections</p>\n<p><strong>Dates created:</strong> 1964-2022</p>\n<p><strong>Dates deposited:</strong> 2005-2023</p>\n<p><strong>ISO 639-3:</strong> yua</p>\n<p><a href=\"https://ailla.utexas.org/languages/85\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 20.5579, "lon": -88.9876, "line": true}}, {"text": {"headline": "Mam", "text": "<p>Mam is a Mayan language spoken by approximately 591,000 people in the western highlands of Guatemala. AILLA holds 263 items related to Mam with only 192 publicly accessible, with the earliest dedicated documentation from 1972. The holdings include narratives, conversations, and wordlists, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection and Clifton Pye's child language recordings. Nora England's collection contributes fieldwork narratives from the 1970s.</p>\n<p><strong>Also known as:</strong> B'anax Mam, Qyool</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 272 items (200 publicly accessible), 9 collections</p>\n<p><strong>Dates created:</strong> 1962-2017</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> mam</p>\n<p><a href=\"https://ailla.utexas.org/languages/33\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.2527, "lon": -91.781, "line": true}}, {"text": {"headline": "Popti'", "text": "<p>Popti' is a Q'anjob'alan Mayan language spoken by approximately 33,000 people in the Huehuetenango department of Guatemala and parts of Chiapas, Mexico. AILLA holds 117 items related to Popti', with the earliest dedicated documentation from 1972. The holdings include narratives, descriptions, and wordlists, with contributions from the Jakalteka/Popti' Linguistic Community Collection of the Academia de Lenguas Mayas de Guatemala (ALMG), the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection, and Colette Grinevald's doctoral fieldwork recordings from Jacaltenango in the early 1970s.</p>\n<p><strong>Also known as:</strong> Jakalteko</p>\n<p><strong>Countries:</strong> Mexico; Guatemala</p>\n<p><strong>AILLA holdings:</strong> 141 items (130 publicly accessible), 7 collections</p>\n<p><strong>Dates created:</strong> 1962-2022</p>\n<p><strong>Dates deposited:</strong> 2002-2022</p>\n<p><strong>ISO 639-3:</strong> jac</p>\n<p><a href=\"https://ailla.utexas.org/languages/32\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.5862, "lon": -91.7355, "line": true}}, {"text": {"headline": "Q'anjob'al", "text": "<p>Q'anjob'al is a Mayan language spoken by approximately 177,000 people in the Huehuetenango department of Guatemala and parts of Chiapas, Mexico. AILLA holds 215 items related to Q'anjob'al with only 112 publicly accessible, with the earliest dedicated documentation from 1972. The holdings include conversations, narratives, and datasets, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection and Clifton Pye's child language recordings. Laura Martin's collection contributes fieldwork recordings and dissertation data from the early 1970s.</p>\n<p><strong>Also known as:</strong> Conob</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 224 items (119 publicly accessible), 12 collections</p>\n<p><strong>Dates created:</strong> 1962-2017</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> kjb</p>\n<p><a href=\"https://ailla.utexas.org/languages/29\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.6627, "lon": -91.3801, "line": true}}, {"text": {"headline": "Tektiteko", "text": "<p>Tektiteko (also known as B'a'aj or Teko) is a Mayan language of the Mamean branch, closely related to Mam, spoken by approximately 3,000 people in Guatemala's Huehuetenango department and neighboring municipalities in Chiapas, Mexico. Though classified as threatened, language use in the Tectitán municipality has reportedly been increasing. AILLA holds 101 items related to Tektiteko, with the earliest dedicated documentation from 1984. The largest body of materials comes from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection, a project by Indigenous Maya scholars that produced dozens of recorded narratives, life histories, and cultural documentation from the Tektiteko community in 2003-2006. Nora England's collection includes earlier field recordings from 1984-1985, with hymns, stories, and linguistic questionnaires.</p>\n<p><strong>Indigenous name:</strong> B'a'aj</p>\n<p><strong>Also known as:</strong> Tujqyol, Teko, Teco, Maya-Tektiteko, Tectitán Mam, Tectitec, Qyool, K'onti'l</p>\n<p><strong>Countries:</strong> Mexico; Guatemala</p>\n<p><strong>AILLA holdings:</strong> 101 items, 5 collections</p>\n<p><strong>Dates created:</strong> 1967-2017</p>\n<p><strong>Dates deposited:</strong> 2008-2020</p>\n<p><strong>ISO 639-3:</strong> ttc</p>\n<p><a href=\"https://ailla.utexas.org/languages/178\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.3896, "lon": -92.0485, "line": true}}, {"text": {"headline": "Poqomchi'", "text": "<p>Poqomchi' is a K'ichean Mayan language spoken by approximately 133,000 people in the Alta Verapaz and Baja Verapaz departments of Guatemala. AILLA holds 109 items related to Poqomchi', with the earliest dedicated documentation from 1998. The holdings include narratives and wordlists, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection.</p>\n<p><strong>Indigenous name:</strong> Poqomchii'</p>\n<p><strong>Also known as:</strong> Tactic Pokomchí, Pocomchí, Poconchí, Pokomchí, Pokonchí</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 115 items (114 publicly accessible), 5 collections</p>\n<p><strong>Dates created:</strong> 1964-2017</p>\n<p><strong>Dates deposited:</strong> 2002-2020</p>\n<p><strong>ISO 639-3:</strong> poh</p>\n<p><a href=\"https://ailla.utexas.org/languages/34\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.2792, "lon": -90.3465, "line": true}}, {"text": {"headline": "Awakateko", "text": "<p>Awakateko is a Mamean Mayan language spoken by approximately 10,100 people in the Huehuetenango department of Guatemala. AILLA holds 130 items related to Awakateko, with the earliest dedicated documentation from 2003. The holdings are rich in descriptions, narratives, and oral histories, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection.</p>\n<p><strong>Indigenous name:</strong> Awakateko</p>\n<p><strong>Also known as:</strong> Aguacateco, Aguacatec</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 133 items, 6 collections</p>\n<p><strong>Dates created:</strong> 1964-2017</p>\n<p><strong>Dates deposited:</strong> 2008-2020</p>\n<p><strong>ISO 639-3:</strong> agu</p>\n<p><a href=\"https://ailla.utexas.org/languages/177\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.3778, "lon": -91.2817, "line": true}}, {"text": {"headline": "Sakapulteko", "text": "<p>Sakapulteko is a K'ichean Mayan language spoken by approximately 6,530 people in the Sacapulas municipality of Guatemala's Quiché department. AILLA holds 112 items related to Sakapulteko, with the earliest dedicated documentation from 2003. The holdings include narratives, histories, and descriptions, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection.</p>\n<p><strong>Also known as:</strong> Sacapulteco, Sacapulas K'iche'</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 113 items (112 publicly accessible), 4 collections</p>\n<p><strong>Dates created:</strong> 1971-2017</p>\n<p><strong>Dates deposited:</strong> 2008-2020</p>\n<p><strong>ISO 639-3:</strong> quv</p>\n<p><a href=\"https://ailla.utexas.org/languages/181\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.3035, "lon": -91.0263, "line": true}}, {"text": {"headline": "Uspanteko", "text": "<p>Uspanteko is a K'ichean Mayan language spoken by approximately 5,130 people in the Quiché department of Guatemala. AILLA holds 134 items related to Uspanteko, with the earliest dedicated documentation from 2003. The holdings include narratives, histories, and descriptions, drawn primarily from the Oxlajuuj Keej Maya' Ajtz'iib' (OKMA) collection. Ryan Bennett and Robert Henderson's collection contributes prosody research materials.</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 135 items, 4 collections</p>\n<p><strong>Dates created:</strong> 1968-2019</p>\n<p><strong>Dates deposited:</strong> 2008-2020</p>\n<p><strong>ISO 639-3:</strong> usp</p>\n<p><a href=\"https://ailla.utexas.org/languages/183\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.4254, "lon": -90.8123, "line": true}}, {"text": {"headline": "Ixil", "text": "<p>Ixil is a Mayan language spoken by approximately 115,000 people in the Quiché department of Guatemala. AILLA holds 643 items related to Ixil with only 239 publicly accessible, with the earliest dedicated documentation from 2005. The largest collection is the Ixil Maya Conversation/Narrative Collection, featuring personal histories, autobiographies, and war experiences recorded by members of the Grupo de Mujeres/Hombres por la Paz in Nebaj. Danny Law's Ixil Collection contributes recordings, transcriptions, and analysis across the Chajul, Cotzal, and Nebaj dialects.</p>\n<p><strong>Countries:</strong> Guatemala</p>\n<p><strong>AILLA holdings:</strong> 655 items (244 publicly accessible), 7 collections</p>\n<p><strong>Dates created:</strong> 1964-2018</p>\n<p><strong>Dates deposited:</strong> 2008-2021</p>\n<p><strong>ISO 639-3:</strong> ixl</p>\n<p><a href=\"https://ailla.utexas.org/languages/46\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 15.4732, "lon": -91.1761, "line": true}}, {"text": {"headline": "Additional Languages", "text": "<p>The following language has significant holdings in AILLA, but public materials account for fewer than 100 items:</p><p><a href=\"https://ailla.utexas.org/languages/54\" target=\"_blank\">Tojolab'al</a> (221 items, 44 public)</p>\n<p>The following 13 languages in the Mayan family have fewer than 100 items in AILLA's current holdings. As AILLA's collections grow, these languages may be featured in future updates to this map.</p><p><a href=\"https://ailla.utexas.org/languages/179\" target=\"_blank\">Achi</a> (32 items)<br><a href=\"https://ailla.utexas.org/languages/127\" target=\"_blank\">Akateko</a> (51 items, 47 public)<br><a href=\"https://ailla.utexas.org/languages/476\" target=\"_blank\">Ch'olti'</a> (3 items)<br><a href=\"https://ailla.utexas.org/languages/176\" target=\"_blank\">Chicomuceltec</a> (3 items)<br><a href=\"https://ailla.utexas.org/languages/48\" target=\"_blank\">Chontal, Tabasco</a> (73 items, 58 public)<br><a href=\"https://ailla.utexas.org/languages/184\" target=\"_blank\">Itza'</a> (6 items)<br><a href=\"https://ailla.utexas.org/languages/149\" target=\"_blank\">Lacandon</a> (68 items, 67 public)<br><a href=\"https://ailla.utexas.org/languages/185\" target=\"_blank\">Mopán</a> (11 items)<br><a href=\"https://ailla.utexas.org/languages/180\" target=\"_blank\">Poqomam</a> (82 items)<br><a href=\"https://ailla.utexas.org/languages/196\" target=\"_blank\">Q'eqchi'</a> (94 items)<br><a href=\"https://ailla.utexas.org/languages/182\" target=\"_blank\">Sipakapense</a> (8 items, 7 public)<br><a href=\"https://ailla.utexas.org/languages/533\" target=\"_blank\">Tuzanteco</a> (5 items)<br><a href=\"https://ailla.utexas.org/languages/197\" target=\"_blank\">Tz'utujil</a> (78 items, 71 public)</p>\n<p><a href=\"https://ailla.utexas.org\" target=\"_blank\">Explore all AILLA collections</a></p>"}, "location": {"lat": 16.0, "lon": -90.5}}], "calculate_zoom": true}};
        var storymap = new KLStoryMap.StoryMap("storymap", storymap_data, {});
        window.addEventListener("resize", function() { storymap.updateDisplay(); });
