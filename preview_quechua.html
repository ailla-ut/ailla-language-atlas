    <title>Preview: Quechua Languages in the AILLA Archive</title>
    <link rel="stylesheet" href="https://cdn.knightlab.com/libs/storymapjs/latest/css/storymap.css">

<body>
    <div id="storymap"></div>
    <script src="https://cdn.knightlab.com/libs/storymapjs/latest/js/storymap-min.js"></script>
    <script>
        var storymap_data = {"storymap": {"language": "en", "map_type": "stamen:terrain", "slides": [{"type": "overview", "text": {"headline": "Quechua Languages in the AILLA Archive", "text": "<p>A chronological journey through the documentation of Quechua languages in the Archive of the Indigenous Languages of Latin America (AILLA) at the University of Texas at Austin.</p><p>This map features <strong>9 languages</strong> with detailed slides, covering the Andes (Argentina, Bolivia, Colombia, Ecuador, Peru). An additional 6 languages are listed in the closing summary.</p><p>Slides are ordered chronologically by the start of dedicated documentation for each language in AILLA's holdings.</p><p><a href=\"https://ailla.utexas.org\" target=\"_blank\">Visit AILLA</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}, {"text": {"headline": "Quechua, South Bolivian", "text": "<p>South Bolivian Quechua is a Quechuan language spoken by approximately 1,616,000 people in Bolivia and Argentina. AILLA holds 302 items related to South Bolivian Quechua with only 140 publicly accessible, with the earliest dedicated documentation from 1969. The holdings include interviews, narratives, and ethnographic materials, with contributions from Gladys Camacho Rios's Bolivian Quechua collection, Rosaleen Howard's Quechua Languages Collection, and collections documenting verbal art and children's speech in Chuquisaca.</p>\n<p><strong>Also known as:</strong> Central Bolivian Quechua, Quechua Boliviano</p>\n<p><strong>Countries:</strong> Argentina; Bolivia</p>\n<p><strong>AILLA holdings:</strong> 307 items (145 publicly accessible), 11 collections</p>\n<p><strong>Dates created:</strong> 1959-2021</p>\n<p><strong>Dates deposited:</strong> 2009-2022</p>\n<p><strong>ISO 639-3:</strong> quh</p>\n<p><a href=\"https://ailla.utexas.org/languages/213\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -17.3651, "lon": -66.1767, "line": true}}, {"text": {"headline": "Inga", "text": "<p>Inga is a Quechuan language spoken by approximately 22,000 people in the Putumayo and Nariño departments of Colombia. AILLA holds 58 items related to Inga, with the earliest dedicated documentation from 1975. The holdings are drawn from John McDowell's Colombian Languages Collection, featuring songs, narratives, and conversations with transcriptions and translations into English.</p>\n<p><strong>Countries:</strong> Colombia</p>\n<p><strong>AILLA holdings:</strong> 60 items (59 publicly accessible), 2 collections</p>\n<p><strong>Dates created:</strong> 1975-2003</p>\n<p><strong>Dates deposited:</strong> 2002-2021</p>\n<p><strong>ISO 639-3:</strong> inb</p>\n<p><a href=\"https://ailla.utexas.org/languages/27\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": 1.1989, "lon": -77.2483, "line": true}}, {"text": {"headline": "Kichwa, Cañar Highland", "text": "<p>Cañar Highland Kichwa is a Quechuan language spoken by approximately 170,000 people in the Cañar, Azuay, and Chimborazo provinces of Ecuador. AILLA holds 85 items related to Cañar Highland Kichwa, with the earliest dedicated documentation from 1976. The holdings include narratives, music, photographs, and ethnographic materials, with contributions from Allison Adrian's Cañari Music and Culture Collection, Rosaleen Howard's oral narrative recordings, Judy Blankenship's documentary photography, and Niels Fock and Eva Krener's anthropological fieldwork from a Cañari village.</p>\n<p><strong>Indigenous name:</strong> Kichwa Shimi</p>\n<p><strong>Also known as:</strong> Quichua de la provincia de Cañar, Runa Shimi</p>\n<p><strong>Countries:</strong> Ecuador</p>\n<p><strong>AILLA holdings:</strong> 155 items (152 publicly accessible), 6 collections</p>\n<p><strong>Dates created:</strong> 1967-2021</p>\n<p><strong>Dates deposited:</strong> 2019-2022</p>\n<p><strong>ISO 639-3:</strong> qxr</p>\n<p><a href=\"https://ailla.utexas.org/languages/232\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -2.5109, "lon": -78.9632, "line": true}}, {"text": {"headline": "Quechua, Huamalíes-Huánuco", "text": "<p>Huamalies-Huanuco Quechua is a Quechuan language spoken by approximately 44,900 people in the Huanuco region of Peru. AILLA holds 71 items related to Huamalies-Huanuco Quechua, with the earliest dedicated documentation from 1982. The entire collection comes from Rosaleen Howard's Quechua Languages Collection, featuring oral narratives, field notes, conversations, and songs.</p>\n<p><strong>Countries:</strong> Peru</p>\n<p><strong>AILLA holdings:</strong> 71 items (66 publicly accessible), 1 collection</p>\n<p><strong>Dates created:</strong> 1982-2011</p>\n<p><strong>ISO 639-3:</strong> qvh</p>\n<p><a href=\"https://ailla.utexas.org/languages/233\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -9.9734, "lon": -76.3149, "line": true}}, {"text": {"headline": "Quechua, Pastaza", "text": "<p>Pastaza Quechua is a Quechuan language spoken by approximately 13,000 people in the Pastaza province of eastern Ecuador. AILLA holds 233 items related to Pastaza Quechua, with the earliest dedicated documentation from 1988. The holdings are predominantly narratives, drawn largely from Janis B. Nuckolls's collection, which includes research on ideophones. Alexander Rice's collection contributes recordings of Ecuadorian Lowland Quechua dialects.</p>\n<p><strong>Also known as:</strong> Sarayucu Quichua, Alama, Bobonaza Quichua, Canelos Quichua, Pastaza Quichua</p>\n<p><strong>Countries:</strong> Ecuador; Peru</p>\n<p><strong>AILLA holdings:</strong> 236 items (217 publicly accessible), 3 collections</p>\n<p><strong>Dates created:</strong> 1980-2019</p>\n<p><strong>Dates deposited:</strong> 2002-2019</p>\n<p><strong>ISO 639-3:</strong> qvz</p>\n<p><a href=\"https://ailla.utexas.org/languages/15\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -2.3295, "lon": -76.9872, "line": true}}, {"text": {"headline": "Quechua, Cuzco", "text": "<p>Cuzco Quechua is a Quechuan language spoken by approximately 668,000 people across several regions of southern Peru. AILLA holds 77 items related to Cuzco Quechua, with the earliest dedicated documentation from 1997. The holdings include interviews and elicitation materials drawn from Rosaleen Howard's Quechua Languages Collection and The Speech of Children from Cusco and Chuquisaca collection.</p>\n<p><strong>Also known as:</strong> Runasimi Qusqu Qullaw, Cuzco Quechua, Qheswa, Qheswasimi, Quechua de Cuzco-Collao, Quechua Qosqo-Qollaw, Runasimi</p>\n<p><strong>Countries:</strong> Peru</p>\n<p><strong>AILLA holdings:</strong> 83 items (81 publicly accessible), 5 collections</p>\n<p><strong>Dates created:</strong> 1997-2013</p>\n<p><strong>Dates deposited:</strong> 2005-2022</p>\n<p><strong>ISO 639-3:</strong> quz</p>\n<p><a href=\"https://ailla.utexas.org/languages/89\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -13.5109, "lon": -71.9405, "line": true}}, {"text": {"headline": "Quechua, Yauyos", "text": "<p>Yauyos Quechua is a Quechuan language cluster spoken by approximately 600 people in the Yauyos province of Lima department, Peru. AILLA holds 222 items related to Yauyos Quechua, with the earliest dedicated documentation from 2010. The entire collection comes from Aviva Shimelman's fieldwork, which documents multiple dialect varieties across communities including Viñac, Hongos, Lincha, Liscay, and Huangáscar. The holdings include narratives, interviews, conversations, and songs.</p>\n<p><strong>Countries:</strong> Peru</p>\n<p><strong>AILLA holdings:</strong> 226 items (220 publicly accessible), 1 collection</p>\n<p><strong>Dates created:</strong> 2001-2014</p>\n<p><strong>Dates deposited:</strong> 2010-2017</p>\n<p><strong>ISO 639-3:</strong> qux</p>\n<p><a href=\"https://ailla.utexas.org/languages/272\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -12.4237, "lon": -75.9166, "line": true}}, {"text": {"headline": "Quechua, Ancash Huayllas", "text": "<p>Ancash Huayllas Quechua is a Central Quechuan language spoken by approximately 173,000 people in the Ancash region of Peru. AILLA holds 33 items related to Ancash Huayllas Quechua, with the earliest dedicated documentation from 2014. The holdings consist of ecological oral histories documenting climate change and glacier recession in Peru's Cordillera Blanca mountains.</p>\n<p><strong>Indigenous name:</strong> Ancash Qichwachaw</p>\n<p><strong>Also known as:</strong> Quechua, Huaraz, Quechua</p>\n<p><strong>Countries:</strong> Peru</p>\n<p><strong>AILLA holdings:</strong> 33 items, 2 collections</p>\n<p><strong>Dates created:</strong> 2014</p>\n<p><strong>Dates deposited:</strong> 2007-2021</p>\n<p><strong>ISO 639-3:</strong> qwh</p>\n<p><a href=\"https://ailla.utexas.org/languages/133\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -9.5526, "lon": -77.4933, "line": true}}, {"text": {"headline": "Quechua, Chachapoyas", "text": "<p>Chachapoyas Quechua is a Quechuan language spoken by approximately 840 people in the Amazonas region of Peru. AILLA holds 10 items related to Chachapoyas Quechua, with the earliest dedicated documentation from 2018. The holdings consist of the Chachapoyas Quechua Flora and Fauna collection, documenting over 600 unique terms collected across 8 villages in the provinces of Chachapoyas and Luya.</p>\n<p><strong>Indigenous name:</strong> Llakwash</p>\n<p><strong>Also known as:</strong> Amazonas</p>\n<p><strong>Countries:</strong> Peru</p>\n<p><strong>AILLA holdings:</strong> 10 items, 1 collection</p>\n<p><strong>Dates created:</strong> 2018</p>\n<p><strong>Dates deposited:</strong> 2019</p>\n<p><strong>ISO 639-3:</strong> quk</p>\n<p><a href=\"https://ailla.utexas.org/languages/539\" target=\"_blank\">View in AILLA</a></p>"}, "location": {"lat": -6.1517, "lon": -77.8476, "line": true}}, {"text": {"headline": "Additional Languages", "text": "<p>The following language has significant holdings in AILLA, but public materials account for fewer than 5 items:</p><p><a href=\"https://ailla.utexas.org/languages/231\" target=\"_blank\">Quichua, Tena Lowland</a> (80 items, 3 public)</p>\n<p>The following 5 languages in the Quechua family have fewer than 5 items in AILLA's current holdings. As AILLA's collections grow, these languages may be featured in future updates to this map.</p><p><a href=\"https://ailla.utexas.org/languages/37\" target=\"_blank\">Napo Quichua</a> (1 item)<br><a href=\"https://ailla.utexas.org/languages/242\" target=\"_blank\">Quechua, Ayacucho</a> (2 items, 1 public)<br><a href=\"https://ailla.utexas.org/languages/587\" target=\"_blank\">Quechua, Huallaga</a> (1 item)<br><a href=\"https://ailla.utexas.org/languages/547\" target=\"_blank\">Quechua, Puno</a> (2 items)<br><a href=\"https://ailla.utexas.org/languages/269\" target=\"_blank\">Quichua, Imbabura</a> (1 item)</p>\n<p><a href=\"https://ailla.utexas.org\" target=\"_blank\">Explore all AILLA collections</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}], "calculate_zoom": true}};
        var storymap = new KLStoryMap.StoryMap("storymap", storymap_data, {});
        window.addEventListener("resize", function() { storymap.updateDisplay(); });
    </script>
