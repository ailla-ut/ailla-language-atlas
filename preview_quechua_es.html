    <script src="https://cdn.knightlab.com/libs/storymapjs/latest/js/storymap-min.js"></script>
    <script>
        var storymap_data = {"storymap": {"language": "es", "map_type": "stamen:terrain", "slides": [{"type": "overview", "text": {"headline": "Lenguas quechuas en el archivo AILLA", "text": "<p>Un recorrido cronológico a través de la documentación de las lenguas quechuas en el Archivo de las Lenguas Indígenas de América Latina (AILLA) de la Universidad de Texas en Austin.</p><p> Este mapa presenta <strong>9 lenguas</strong> con diapositivas detalladas, que cubren los Andes (Argentina, Bolivia, Colombia, Ecuador, Perú). Además, 6 lenguas se enumeran en el resumen final.</p><p> Las diapositivas están ordenadas cronológicamente según el inicio de la documentación específica para cada idioma en los fondos de AILLA.</p><p> <a href=\"https://ailla.utexas.org\" target=\"_blank\">Visitar AILLA</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}, {"text": {"headline": "Quechua, South Bolivian", "text": "<p>El quechua del sur de Bolivia es una lengua quechua hablada por aproximadamente 1.616.000 personas en Bolivia y Argentina. AILLA posee 302 elementos relacionados con el quechua del sur de Bolivia, de los cuales solo 140 son de acceso público, siendo la documentación más antigua dedicada a este tema de 1969. Los fondos incluyen entrevistas, narraciones y materiales etnográficos, con contribuciones de la colección de quechua boliviano de Gladys Camacho Ríos, la Colección de Lenguas Quechuas de Rosaleen Howard y colecciones que documentan el arte verbal y el habla infantil en chuquisaca.</p><p> <strong>También conocido como:</strong> Quechua boliviano central, Quechua boliviano</p><p> <strong>Países:</strong> Argentina; Bolivia</p><p> <strong>Fondos de AILLA:</strong> 307 elementos (145 de acceso público), 11 colecciones</p><p> <strong>Fechas de creación:</strong> 1959-2021</p><p> <strong>Fechas de depósito:</strong> 2009-2022</p><p> <strong>ISO 639-3:</strong> quh</p><p> <a href=\"https://ailla.utexas.org/languages/213\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -17.3651, "lon": -66.1767, "line": true}}, {"text": {"headline": "Inga", "text": "<p>El inga es una lengua quechua hablada por aproximadamente 22 000 personas en los departamentos de Putumayo y Nariño, en Colombia. AILLA posee 58 elementos relacionados con el inga, cuya documentación más antigua data de 1975. Los fondos provienen de la Colección de Lenguas Colombianas de John McDowell e incluyen canciones, narraciones y conversaciones con transcripciones y traducciones al inglés.</p><p> <strong>Países:</strong> Colombia</p><p> <strong>Fondos de AILLA:</strong> 60 elementos (59 de acceso público), 2 colecciones</p><p> <strong>Fechas de creación:</strong> 1975-2003</p><p> <strong>Fechas de depósito:</strong> 2002-2021</p><p> <strong>ISO 639-3:</strong> inb</p><p> <a href=\"https://ailla.utexas.org/languages/27\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": 1.1989, "lon": -77.2483, "line": true}}, {"text": {"headline": "Kichwa, Cañar Highland", "text": "<p>El kichwa de las tierras altas de Cañar es una lengua quechua hablada por aproximadamente 170 000 personas en las provincias de Cañar, Azuay y Chimborazo, en Ecuador. AILLA posee 85 elementos relacionados con el kichwa de las tierras altas de Cañar, con la documentación más antigua dedicada a este tema que data de 1976. Los fondos incluyen narraciones, música, fotografías y materiales etnográficos, con contribuciones de la Colección de Música y Cultura Cañari de Allison Adrian, las grabaciones de narraciones orales de Rosaleen Howard, la fotografía documental de Judy Blankenship y el trabajo de campo antropológico de Niels Fock y Eva Krener en una aldea Cañari.</p><p> <strong>Nombre indígena:</strong> Kichwa Shimi</p><p> <strong>También conocido como:</strong> Quichua de la provincia de Cañar, Runa Shimi</p><p> <strong>Países:</strong> Ecuador</p><p> <strong>Fondos de AILLA:</strong> 155 elementos (152 de acceso público), 6 colecciones</p><p> <strong>Fechas de creación:</strong> 1967-2021</p><p> <strong>Fechas de depósito:</strong> 2019-2022</p><p> <strong>ISO 639-3:</strong> qxr</p><p> <a href=\"https://ailla.utexas.org/languages/232\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -2.5109, "lon": -78.9632, "line": true}}, {"text": {"headline": "Quechua, Huamalíes-Huánuco", "text": "<p>El quechua huamalies-huanuco es una lengua quechua hablada por aproximadamente 44.900 personas en la región de Huánuco, Perú. AILLA posee 71 elementos relacionados con el quechua huamalies-huanuco, con la documentación más antigua dedicada a este tema que data de 1982. La colección completa proviene de la Colección de Lenguas Quechuas de Rosaleen Howard, que incluye narraciones orales, notas de campo, conversaciones y canciones.</p><p> <strong>Países:</strong> Perú</p><p> <strong>Fondos de AILLA:</strong> 71 elementos (66 de acceso público), 1 colección</p><p> <strong>Fechas de creación:</strong> 1982-2011</p><p> <strong>ISO 639-3:</strong> qvh</p><p> <a href=\"https://ailla.utexas.org/languages/233\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -9.9734, "lon": -76.3149, "line": true}}, {"text": {"headline": "Quechua, Pastaza", "text": "<p>El quechua de Pastaza es una lengua quechua hablada por aproximadamente 13 000 personas en la provincia de Pastaza, al oriente ecuatoriano. AILLA posee 233 elementos relacionados con el quechua de Pastaza, con la documentación más antigua dedicada a este tema que data de 1988. Los fondos consisten principalmente en narraciones, extraídas en gran parte de la colección de Janis B. Nuckolls, que incluye investigaciones sobre ideófonos. La colección de Alexander Rice aporta grabaciones de dialectos quechuas de las tierras bajas ecuatorianas.</p><p> <strong>También conocido como:</strong> Sarayucu Quichua, Alama, Bobonaza Quichua, Canelos Quichua, Pastaza Quichua</p><p> <strong>Países:</strong> Ecuador; Perú</p><p> <strong>Fondos de AILLA:</strong> 236 elementos (217 de acceso público), 3 colecciones</p><p> <strong>Fechas de creación:</strong> 1980-2019</p><p> <strong>Fechas de depósito:</strong> 2002-2019</p><p> <strong>ISO 639-3:</strong> qvz</p><p> <a href=\"https://ailla.utexas.org/languages/15\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -2.3295, "lon": -76.9872, "line": true}}, {"text": {"headline": "Quechua, Cuzco", "text": "<p>El quechua cusqueño es una lengua quechua hablada por aproximadamente 668.000 personas en varias regiones del sur de Perú. AILLA posee 77 elementos relacionados con el quechua cusqueño, con la documentación más antigua dedicada a este tema que data de 1997. Los fondos incluyen entrevistas y materiales de elicitación extraídos de la Colección de Lenguas Quechuas de Rosaleen Howard y de la colección El Habla de los Niños de Cusco y Chuquisaca.</p><p> <strong>También conocido como:</strong> Runasimi Qusqu Qullaw, Cuzco Quechua, Qheswa, Qheswasimi, Quechua de Cuzco-Collao, Quechua Qosqo-Qollaw, Runasimi</p><p> <strong>Países:</strong> Perú</p><p> <strong>Fondos de AILLA:</strong> 83 elementos (81 de acceso público), 5 colecciones</p><p> <strong>Fechas de creación:</strong> 1997-2013</p><p> <strong>Fechas de depósito:</strong> 2005-2022</p><p> <strong>ISO 639-3:</strong> cuestionario</p><p> <a href=\"https://ailla.utexas.org/languages/89\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -13.5109, "lon": -71.9405, "line": true}}, {"text": {"headline": "Quechua, Yauyos", "text": "<p>El quechua de Yauyos es un grupo lingüístico quechua hablado por aproximadamente 600 personas en la provincia de Yauyos, departamento de Lima, Perú. AILLA posee 222 elementos relacionados con el quechua de Yauyos, con la documentación más antigua dedicada a este tema que data de 2010. Toda la colección proviene del trabajo de campo de Aviva Shimelman, quien documentó múltiples variedades dialectales en comunidades como Viñac, Hongos, Lincha, Liscay y Huangáscar. Los fondos incluyen narraciones, entrevistas, conversaciones y canciones.</p><p> <strong>Países:</strong> Perú</p><p> <strong>Fondos de AILLA:</strong> 226 elementos (220 de acceso público), 1 colección</p><p> <strong>Fechas de creación:</strong> 2001-2014</p><p> <strong>Fechas de depósito:</strong> 2010-2017</p><p> <strong>ISO 639-3:</strong> qux</p><p> <a href=\"https://ailla.utexas.org/languages/272\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -12.4237, "lon": -75.9166, "line": true}}, {"text": {"headline": "Quechua, Ancash Huayllas", "text": "<p>El quechua de Ancash Huayllas es una lengua quechua central hablada por aproximadamente 173.000 personas en la región de Ancash, Perú. AILLA posee 33 elementos relacionados con el quechua de Ancash Huayllas, con la documentación más antigua dedicada a este tema que data de 2014. Los fondos consisten en historias orales ecológicas que documentan el cambio climático y el retroceso de los glaciares en la Cordillera Blanca de Perú.</p><p> <strong>Nombre indígena:</strong> Ancash Qichwachaw</p><p> <strong>También conocido como:</strong> Quechua, Huaraz, Quechua</p><p> <strong>Países:</strong> Perú</p><p> <strong>Fondos de AILLA:</strong> 33 elementos, 2 colecciones</p><p> <strong>Fechas de creación:</strong> 2014</p><p> <strong>Fechas de depósito:</strong> 2007-2021</p><p> <strong>ISO 639-3:</strong> qwh</p><p> <a href=\"https://ailla.utexas.org/languages/133\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -9.5526, "lon": -77.4933, "line": true}}, {"text": {"headline": "Quechua, Chachapoyas", "text": "<p>El quechua chachapoyas es una lengua quechua hablada por aproximadamente 840 personas en la región amazónica de Perú. AILLA posee 10 elementos relacionados con el quechua chachapoyas, con la documentación más antigua dedicada a este tema que data de 2018. Los fondos consisten en la colección de flora y fauna quechua chachapoyas, que documenta más de 600 términos únicos recopilados en 8 aldeas de las provincias de Chachapoyas y Luya.</p><p> <strong>Nombre indígena:</strong> Llakwash</p><p> <strong>También conocido como:</strong> Amazonas</p><p> <strong>Países:</strong> Perú</p><p> <strong>Fondos de AILLA:</strong> 10 elementos, 1 colección</p><p> <strong>Fechas de creación:</strong> 2018</p><p> <strong>Fechas de depósito:</strong> 2019</p><p> <strong>ISO 639-3:</strong> quk</p><p> <a href=\"https://ailla.utexas.org/languages/539\" target=\"_blank\">Ver en AILLA</a></p>"}, "location": {"lat": -6.1517, "lon": -77.8476, "line": true}}, {"text": {"headline": "Lenguas adicionales", "text": "<p>Las siguientes lenguas tienen participaciones significativas en AILLA, pero los materiales públicos representan menos de 5 elementos:</p><p> <a href=\"https://ailla.utexas.org/languages/231\" target=\"_blank\">Quichua, Tierras Bajas de Tena</a> (80 elementos, 3 públicos)</p><p> Las siguientes 5 lenguas de la familia quechua tienen menos de 5 elementos en los fondos actuales de AILLA. A medida que las colecciones de AILLA crezcan, estas lenguas podrán aparecer en futuras actualizaciones de este mapa.</p><p> <a href=\"https://ailla.utexas.org/languages/37\" target=\"_blank\">Napo Quichua</a> (1 elemento)<br> <a href=\"https://ailla.utexas.org/languages/242\" target=\"_blank\">Quechua, Ayacucho</a> (2 elementos, 1 público)<br> <a href=\"https://ailla.utexas.org/languages/587\" target=\"_blank\">Quechua, Huallaga</a> (1 elemento)<br> <a href=\"https://ailla.utexas.org/languages/547\" target=\"_blank\">Quechua, Puno</a> (2 elementos)<br> <a href=\"https://ailla.utexas.org/languages/269\" target=\"_blank\">Quichua, Imbabura</a> (1 elemento)</p><p> <a href=\"https://ailla.utexas.org\" target=\"_blank\">Explorar todas las colecciones de AILLA</a></p>"}, "location": {"lat": -8.0, "lon": -75.0}}], "calculate_zoom": true}};
        var storymap = new KLStoryMap.StoryMap("storymap", storymap_data, {});
        window.addEventListener("resize", function() { storymap.updateDisplay(); });
